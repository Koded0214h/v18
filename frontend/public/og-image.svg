<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- background -->
  <rect width="1200" height="630" fill="#0d1117"/>

  <!-- subtle scanlines -->
  <rect width="1200" height="630" fill="url(#scan)" opacity="0.03"/>
  <defs>
    <pattern id="scan" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="2" fill="#fff"/>
    </pattern>
  </defs>

  <!-- left green accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="#00FF41" opacity="0.7"/>

  <!-- top border line -->
  <rect x="0" y="0" width="1200" height="1" fill="#00FF41" opacity="0.2"/>
  <!-- bottom border line -->
  <rect x="0" y="629" width="1200" height="1" fill="#00FF41" opacity="0.2"/>

  <!-- divider between text and sprite -->
  <rect x="700" y="60" width="1" height="510" fill="#00FF41" opacity="0.1"/>

  <!-- ── LEFT: text content ── -->

  <!-- prompt -->
  <text x="60" y="120" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="22" fill="#00FF41" opacity="0.8">koded@os:~$ whoami</text>

  <!-- name -->
  <text x="60" y="210" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="72" font-weight="bold" fill="#ffffff" letter-spacing="-2">I AM KODED</text>

  <!-- subtitle -->
  <text x="60" y="258" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="20" fill="#888888">software engineer · cs student · Lagos, NG</text>

  <!-- separator line -->
  <rect x="60" y="285" width="580" height="1" fill="#222222"/>

  <!-- stats -->
  <text x="60" y="328" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="17" fill="#39D353">projects        <tspan fill="#ffffff">103</tspan></text>
  <text x="60" y="362" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="17" fill="#E3B341">hackathons_won  <tspan fill="#ffffff">6</tspan></text>
  <text x="60" y="396" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="17" fill="#F85149">all_nighters    <tspan fill="#ffffff">30</tspan></text>
  <text x="60" y="430" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="17" fill="#BC8CFF">status          <tspan fill="#ffffff">grinding 24/7</tspan></text>

  <!-- cursor blink rect -->
  <rect x="60" y="470" width="12" height="24" fill="#00FF41" opacity="0.9"/>

  <!-- version footer -->
  <text x="60" y="590" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="14" fill="#333333">koded_os_v18 · build 2026.05.31</text>

  <!-- ── RIGHT: pixel-art sprite (P=18, body=#00FF41, hat=#F85149) ── -->
  <!-- ox=830, oy=105 — sprite is 16*18=288 wide, 22*18=396 tall → bottom at 501 -->

  <!-- hat star: x=7*18+830=956, y=105, w=36, h=18 -->
  <rect x="956" y="105" width="36" height="18" fill="#FFD700"/>
  <!-- hat cone r1: x=6*18+830=938, y=123, w=72, h=18 -->
  <rect x="938" y="123" width="72" height="18" fill="#F85149"/>
  <!-- hat cone r2: x=5*18+830=920, y=141, w=108, h=18 -->
  <rect x="920" y="141" width="108" height="18" fill="#F85149"/>
  <!-- hat brim: x=4*18+830=902, y=159, w=144, h=18 -->
  <rect x="902" y="159" width="144" height="18" fill="#F85149"/>
  <!-- head: x=5*18+830=920, y=177, w=108, h=90 -->
  <rect x="920" y="177" width="108" height="90" fill="#00FF41"/>
  <!-- eye left: x=6*18+830=938, y=6*18+105=213, w=18, h=18 -->
  <rect x="938" y="213" width="18" height="18" fill="#000000" opacity="0.65"/>
  <!-- eye right: x=9*18+830=992, y=213, w=18, h=18 -->
  <rect x="992" y="213" width="18" height="18" fill="#000000" opacity="0.65"/>
  <!-- smile: x=6*18+830=938, y=8*18+105=249, w=72, h=18 -->
  <rect x="938" y="249" width="72" height="18" fill="#000000" opacity="0.5"/>
  <!-- cheek left: x=5*18+830=920, y=7*18+105=231, w=18, h=18 -->
  <rect x="920" y="231" width="18" height="18" fill="#ff9999" opacity="0.4"/>
  <!-- cheek right: x=10*18+830=1010, y=231, w=18, h=18 -->
  <rect x="1010" y="231" width="18" height="18" fill="#ff9999" opacity="0.4"/>
  <!-- body: x=5*18+830=920, y=9*18+105=267, w=108, h=72 -->
  <rect x="920" y="267" width="108" height="72" fill="#00FF41"/>
  <!-- left arm: x=3*18+830=884, y=267, w=36, h=36 -->
  <rect x="884" y="267" width="36" height="36" fill="#00FF41"/>
  <!-- right arm: x=11*18+830=1028, y=267, w=36, h=36 -->
  <rect x="1028" y="267" width="36" height="36" fill="#00FF41"/>
  <!-- left leg: x=5*18+830=920, y=13*18+105=339, w=36, h=54 -->
  <rect x="920" y="339" width="36" height="54" fill="#00FF41"/>
  <!-- right leg: x=9*18+830=992, y=339, w=36, h=54 -->
  <rect x="992" y="339" width="36" height="54" fill="#00FF41"/>
  <!-- left foot: x=4*18+830=902, y=16*18+105=393, w=54, h=36 -->
  <rect x="902" y="393" width="54" height="36" fill="#00FF41"/>
  <!-- right foot: x=9*18+830=992, y=393, w=54, h=36 -->
  <rect x="992" y="393" width="54" height="36" fill="#00FF41"/>

  <!-- confetti around sprite -->
  <rect x="866" y="195" width="18" height="18" fill="#FFD700" opacity="0.8"/>
  <rect x="1100" y="177" width="18" height="18" fill="#F85149" opacity="0.8"/>
  <rect x="848" y="267" width="18" height="18" fill="#BC8CFF" opacity="0.8"/>
  <rect x="1100" y="303" width="18" height="18" fill="#58A6FF" opacity="0.8"/>

  <!-- extra scattered confetti for fun -->
  <rect x="750" y="140" width="10" height="10" fill="#E3B341" opacity="0.5"/>
  <rect x="770" y="320" width="8"  height="8"  fill="#00FF41" opacity="0.4"/>
  <rect x="740" y="450" width="12" height="12" fill="#BC8CFF" opacity="0.4"/>
  <rect x="1140" y="500" width="10" height="10" fill="#39D353" opacity="0.5"/>
  <rect x="1160" y="200" width="8"  height="8"  fill="#F85149" opacity="0.4"/>

  <!-- hat tip star glow -->
  <circle cx="974" cy="114" r="6" fill="#FFD700" opacity="0.3"/>
</svg>
