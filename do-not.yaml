services:
  # ── Backend (Django) ──────────────────────────────────────────────────────────
  - type: web
    name: v18-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn backend.wsgi:application --workers 2 --timeout 120
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: v18-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard
      - key: CORS_ALLOWED_ORIGINS
        sync: false          # set to your frontend URL after first deploy

  # ── Frontend (Vite → static) ──────────────────────────────────────────────────
  - type: web
    name: v18-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # set to https://v18-api.onrender.com/api/v1

databases:
  - name: v18-db
    plan: free
